<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Arcade: 2-in-1 Game Center</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #11111d;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            flex-direction: column;
            color: #ffffff;
        }
        #arcade-shell {
            background-color: #1a1a2e;
            border: 6px double #444466;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7), inset 0 0 20px rgba(0,255,204,0.1);
            max-width: 850px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #game-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            width: 100%;
            justify-content: center;
        }
        .tab-btn {
            background: #2e2e50;
            border: 2px solid #444466;
            color: #8888aa;
            padding: 10px 24px;
            font-size: 16px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .tab-btn:hover {
            background: #3a3a66;
            color: #fff;
        }
        .tab-btn.active {
            background: linear-gradient(45deg, #ff0055, #00ffcc);
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 15px rgba(0,255,204,0.4);
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 400px;
            background-color: #000;
            border: 4px solid #222;
            overflow: hidden;
            border-radius: 6px;
        }
        canvas {
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 15px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-family: monospace;
            font-size: 20px;
            color: #00ffcc;
            text-shadow: 0 0 5px #00ffcc;
            font-weight: bold;
            pointer-events: none;
            z-index: 5;
        }
        #game-over-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 10, 26, 0.9);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        #game-over-screen h1 {
            color: #ff0055;
            font-size: 42px;
            margin-bottom: 10px;
            letter-spacing: 4px;
            font-family: monospace;
            text-shadow: 0 0 10px #ff0055;
        }
        #final-stats {
            color: #fff;
            font-family: monospace;
            font-size: 18px;
            margin-bottom: 25px;
            text-align: center;
            line-height: 1.6;
        }
        #restart-btn {
            padding: 12px 28px;
            background: linear-gradient(45deg, #00ffcc, #0077ff);
            color: black;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0,255,204,0.4);
            transition: transform 0.1s, box-shadow 0.2s;
        }
        #restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0,255,204,0.8);
        }
        #instructions-panel {
            margin-top: 20px;
            color: #a0a0c0;
            font-size: 14px;
            text-align: center;
            line-height: 1.6;
            min-height: 45px;
        }
        .key {
            background: #2e2e50;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
            color: #00ffcc;
            border-bottom: 2px solid #151530;
        }
    </style>
</head>
<body>

    <div id="arcade-shell">
        <div id="game-selector">
            <button class="tab-btn active" id="tab-dino" onclick="switchGame('dino')">🦖 Dinosaur Run</button>
            <button class="tab-btn" id="tab-bike" onclick="switchGame('bike')">🏍️ Bike Rider</button>
        </div>

        <div id="game-container">
            <div id="ui-layer">
                <div id="ui-left">SCORE: <span id="ui-score">00000</span></div>
                <div id="ui-right">HI SCORE: <span id="ui-high">00000</span></div>
            </div>
            <canvas id="gameCanvas" width="800" height="400"></canvas>
            
            <div id="game-over-screen">
                <h1 id="game-over-title">GAME OVER</h1>
                <div id="final-stats"></div>
                <button id="restart-btn">PLAY AGAIN</button>
            </div>
        </div>

        <div id="instructions-panel"></div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const uiLeft = document.getElementById('ui-left');
        const uiRight = document.getElementById('ui-right');
        const gameOverScreen = document.getElementById('game-over-screen');
        const gameOverTitle = document.getElementById('game-over-title');
        const finalStats = document.getElementById('final-stats');
        const restartBtn = document.getElementById('restart-btn');
        const instructionsPanel = document.getElementById('instructions-panel');

        // Engine State Configurations
        let activeGame = 'dino'; 
        let score = 0;
        let dinoHighScore = 0;
        let bikeHighScore = 0;
        let isGameOver = false;
        let isRunning = false;
        
        // Physics Engine Shared Variables
        let gameSpeed = 6;
        let lastSpawnTime = 0;
        let lastCloudTime = 0;
        let trackOffset = 0;
        let obstacles = [];
        let clouds = [];
        let particles = [];

        // Controller input buffers
        const keys = {};
        window.addEventListener('keydown', e => {
            const keyLower = e.key.toLowerCase();
            if (["space", "arrowup", "arrowdown", "arrowleft", "arrowright", "w", "s", "a", "d", " "].includes(keyLower)) {
                e.preventDefault();
            }
            keys[keyLower] = true;
            
            if (!isRunning && !isGameOver) {
                if (activeGame === 'dino' && (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w')) {
                    isRunning = true;
                } else if (activeGame === 'bike') {
                    isRunning = true;
                }
            }
        });
        window.addEventListener('keyup', e => {
            keys[e.key.toLowerCase()] = false;
        });

        // --- ENTIRE GAME DATA OBJECTS ---
        
        // T-Rex Character Structure
        const dino = {
            x: 60,
            y: 280,
            width: 44,
            height: 47,
            originalHeight: 47,
            duckHeight: 28,
            gravity: 0.6,
            velocity: 0,
            jumpForce: -12,
            isGrounded: true,
            isDucking: false,
            legToggle: true,
            frameTimer: 0,

            update() {
                if (keys['arrowdown'] || keys['s']) {
                    this.isDucking = true;
                    this.height = this.duckHeight;
                } else {
                    this.isDucking = false;
                    this.height = this.originalHeight;
                }

                if ((keys[' '] || keys['arrowup'] || keys['w']) && this.isGrounded && !this.isDucking) {
                    this.velocity = this.jumpForce;
                    this.isGrounded = false;
                }

                this.velocity += this.gravity;
                this.y += this.velocity;

                const groundLevel = 330 - this.height;
                if (this.y >= groundLevel) {
                    this.y = groundLevel;
                    this.velocity = 0;
                    this.isGrounded = true;
                }

                this.frameTimer++;
                if (this.frameTimer % 8 === 0) this.legToggle = !this.legToggle;
            },

            draw() {
                ctx.fillStyle = '#535353';
                ctx.save();
                ctx.translate(this.x, this.y);

                if (!this.isDucking) {
                    ctx.fillRect(10, 12, 24, 20); // Torso
                    ctx.fillRect(22, 0, 22, 14);  // Head
                    ctx.fillStyle = isGameOver ? '#535353' : '#ffffff'; 
                    if (isGameOver) {
                        ctx.fillRect(26, 3, 5, 2); ctx.fillRect(27, 2, 3, 4);
                    } else {
                        ctx.fillRect(26, 3, 3, 3);
                    }
                    ctx.fillStyle = '#535353';
                    ctx.fillRect(22, 14, 12, 3);   // Mouth snout
                    ctx.fillRect(34, 18, 6, 3);    // Small arm
                    ctx.fillRect(0, 16, 10, 10);   // Upper tail
                    ctx.fillRect(4, 26, 6, 4);     // Lower tail

                    if (isGameOver) {
                        ctx.fillRect(14, 32, 4, 15); ctx.fillRect(26, 32, 4, 15);
                    } else if (this.isGrounded) {
                        if (this.legToggle) {
