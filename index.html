<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Bike Rider</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            flex-direction: column;
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 400px;
            background-color: #000;
            border: 4px solid #333;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        canvas {
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 15px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-family: monospace;
            font-size: 20px;
            color: #00ffcc;
            text-shadow: 0 0 5px #00ffcc;
            font-weight: bold;
            pointer-events: none;
            z-index: 5;
        }
        #game-over-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 10, 26, 0.9);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        #game-over-screen h1 {
            color: #ff0055;
            font-size: 42px;
            margin-bottom: 10px;
            letter-spacing: 4px;
            font-family: monospace;
            text-shadow: 0 0 10px #ff0055;
        }
        #final-stats {
            color: #fff;
            font-family: monospace;
            font-size: 18px;
            margin-bottom: 25px;
            text-align: center;
            line-height: 1.6;
        }
        #restart-btn {
            padding: 12px 28px;
            background: linear-gradient(45deg, #00ffcc, #0077ff);
            color: black;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0,255,204,0.4);
            transition: transform 0.1s, box-shadow 0.2s;
        }
        #restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0,255,204,0.8);
        }
        .instructions {
            margin-top: 20px;
            color: #a0a0c0;
            font-size: 14px;
            text-align: center;
            line-height: 1.6;
        }
        .key {
            background: #2e2e50;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
            color: #00ffcc;
            border-bottom: 2px solid #151530;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">
            <div>SCORE: <span id="ui-score">00000</span></div>
            <div>SPEED: <span id="ui-speed">0</span> KM/H</div>
        </div>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <div id="game-over-screen">
            <h1>CRASH DETECTED</h1>
            <div id="final-stats"></div>
            <button id="restart-btn">Drive Again</button>
        </div>
    </div>

    <div class="instructions">
        Press <span class="key">← Arrow</span> or <span class="key">A</span> to move Left. 
        Press <span class="key">→ Arrow</span> or <span class="key">D</span> to move Right.<br>
        Hold <span class="key">↑ Arrow</span> or <span class="key">W</span> to Accelerate. Avoid the oncoming traffic!
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const uiScore = document.getElementById('ui-score');
        const uiSpeed = document.getElementById('ui-speed');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalStats = document.getElementById('final-stats');
        const restartBtn = document.getElementById('restart-btn');

        // State variables
        let score = 0;
        let baseSpeed = 4;
        let playerSpeedModifier = 0;
        let currentSpeedKmh = 0;
        let isGameOver = false;
        let isRunning = false;
        let currentTrackOffset = 0;

        let vehicles = [];
        let particles = [];
        let lastVehicleSpawn = 0;

        // Lane definitions (Pseud-3D Road perspective layout mapping)
        const totalLanes = 3;
        const laneWidths =; // Base widths for lanes

        const keys = {};
        window.addEventListener('keydown', e => {
            if (["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "w", "s", "a", "d"].includes(e.key.toLowerCase())) {
                e.preventDefault();
            }
            keys[e.key.toLowerCase()] = true;
            if (!isRunning && !isGameOver) isRunning = true;
        });
        window.addEventListener('keyup', e => {
            keys[e.key.toLowerCase()] = false;
        });

        // Player Entity (Motorbike)
        const player = {
            x: canvas.width / 2,
            y: canvas.height - 75,
            width: 30,
            height: 60,
            sideSpeed: 5,
            targetX: canvas.width / 2,

            update() {
                // Acceleration handling
                if (keys['arrowup'] || keys['w']) {
                    playerSpeedModifier = Math.min(playerSpeedModifier + 0.1, 6);
                } else {
                    playerSpeedModifier = Math.max(playerSpeedModifier - 0.1, 0);
                }
                
                currentSpeedKmh = Math.floor((baseSpeed + playerSpeedModifier) * 22);

                // Lane movements
                if (keys['arrowleft'] || keys['a']) {
                    this.x -= this.sideSpeed;
                }
                if (keys['arrowright'] || keys['d']) {
                    this.x += this.sideSpeed;
                }

                // Keep bike on the tarmac boundaries
                const roadLeftBound = 160;
                const roadRightBound = canvas.width - 160;
                if (this.x < roadLeftBound) this.x = roadLeftBound;
                if (this.x > roadRightBound) this.x = roadRightBound;

                // Spawn exhaust particles if moving fast
                if (currentSpeedKmh > 50 && Math.random() > 0.4) {
                    particles.push(new Particle(this.x, this.y + this.height - 5, '#00ffcc'));
                }
            },

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                // Bike Frame Shadow
                ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                ctx.fillRect(-10, 10, 20, 55);

                // Main Frame Body
                ctx.fillStyle = '#ff0055';
                ctx.fillRect(-6, 10, 12, 40); // Body core

                // Tires (Front & Back)
                ctx.fillStyle = '#111';
                ctx.fillRect(-4, 0, 8, 14); // Front Wheel
                ctx.fillRect(-5, 42, 10, 18); // Back Wheel

                // Handlebars
                ctx.fillStyle = '#333';
                ctx.fillRect(-15, 12, 30, 4);
                ctx.fillStyle = '#00ffcc'; // Glowing handles
                ctx.fillRect(-17, 12, 3, 4);
                ctx.fillRect(14, 12, 3, 4);

                // Rider Engine Cover / Details
                ctx.fillStyle = '#ffde00';
                ctx.fillRect(-4, 20, 8, 12);
                
                // Neon Tail lights
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(-4, 52, 8, 3);

                ctx.restore();
            }
        };

        // Oncoming Traffic Class
        class Vehicle {
            constructor() {
                // Randomly place into one of three designated horizontal road areas
                const lanes =;
                this.x = lanes[Math.floor(Math.random() * lanes.length)] + (Math.random() * 20 - 10);
                this.y = -80;
                this.width = 45;
                this.height = 75;
                this.speed = Math.random() * 2 + 2;
                
                const colors = ['#0077ff', '#9b5de5', '#f15bb5', '#fee440', '#00f5d4'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }

            update(globalSpeed) {
                this.y += this.speed + (globalSpeed * 0.7); // Relative velocity simulation
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                // Vehicle Shadows
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.fillRect(-this.width/2 + 4, 6, this.width, this.height);

                // Base Body Shell
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.width/2, 0, this.width, this.height);

                // Windshield window grids
                ctx.fillStyle = '#222';
                ctx.fillRect(-this.width/2 + 4, 15, this.width - 8, 12); // Front window
                ctx.fillRect(-this.width/2 + 4, 50, this.width - 8, 10); // Rear window

                // Headlights
                ctx.fillStyle = '#ffffaa';
                ctx.fillRect(-this.width/2 + 3, this.height - 4, 6, 4);
                ctx.fillRect(this.width/2 - 9, this.height - 4, 6, 4);

                ctx.restore();
            }
        }
