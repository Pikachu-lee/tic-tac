<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bike Rider Game</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial,Helvetica,sans-serif;
    overflow:hidden;
}

#gameBox{
    position:relative;
}

canvas{
    background:#6ec6ff;
    border:4px solid #333;
    display:block;
}

#score{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-size:24px;
    font-weight:bold;
    text-shadow:2px 2px 5px black;
}

#gameOver{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.8);
    color:white;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

#gameOver h1{
    font-size:50px;
    margin-bottom:20px;
}

button{
    padding:12px 25px;
    font-size:20px;
    cursor:pointer;
    border:none;
    border-radius:5px;
    background:#00cc66;
    color:white;
}

button:hover{
    background:#00aa55;
}
</style>

</head>
<body>

<div id="gameBox">

<div id="score">
Score : 0
</div>

<canvas id="game" width="800" height="450"></canvas>

<div id="gameOver">
<h1>GAME OVER</h1>
<button id="restart">Restart</button>
</div>

</div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const scoreText=document.getElementById("score");
const gameOver=document.getElementById("gameOver");
const restartBtn=document.getElementById("restart");

let score=0;
let gameRunning=true;

const keys={};

document.addEventListener("keydown",(e)=>{
keys[e.key]=true;
});

document.addEventListener("keyup",(e)=>{
keys[e.key]=false;
});

const bike={
x:120,
y:320,
width:70,
height:40,
speed:6
};

const road={
lineOffset:0
};

const obstacles=[];

function drawRoad(){

ctx.fillStyle="#555";
ctx.fillRect(0,250,800,200);

ctx.fillStyle="#228B22";
ctx.fillRect(0,0,800,250);

ctx.fillStyle="#228B22";
ctx.fillRect(0,430,800,20);

ctx.strokeStyle="white";
ctx.lineWidth=6;

road.lineOffset+=8;

if(road.lineOffset>40)
road.lineOffset=0;

for(let x=-40;x<850;x+=40){

ctx.beginPath();

ctx.moveTo(x+road.lineOffset,340);

ctx.lineTo(x+20+road.lineOffset,340);

ctx.stroke();

}

}

function drawBike(){

ctx.fillStyle="red";

ctx.fillRect(
bike.x,
bike.y,
bike.width,
bike.height
);

ctx.fillStyle="black";

ctx.beginPath();
ctx.arc(
bike.x+15,
bike.y+40,
12,
0,
Math.PI*2
);
ctx.fill();

ctx.beginPath();
ctx.arc(
bike.x+55,
bike.y+40,
12,
0,
Math.PI*2
);
ctx.fill();

ctx.fillStyle="yellow";

ctx.fillRect(
bike.x+18,
bike.y-15,
20,
18
);

}

function updateBike(){

if(keys["ArrowUp"])
bike.y-=bike.speed;

if(keys["ArrowDown"])
bike.y+=bike.speed;

if(keys["ArrowLeft"])
bike.x-=bike.speed;

if(keys["ArrowRight"])
bike.x+=bike.speed;

if(bike.x<0)
bike.x=0;

if(bike.x+bike.width>800)
bike.x=800-bike.width;

if(bike.y<250)
bike.y=250;

if(bike.y+bike.height>430)
bike.y=430-bike.height;

}

function gameLoop(){

ctx.clearRect(0,0,800,450);

drawRoad();

updateBike();

drawBike();

/* More code comes in Part 2 */

if(gameRunning)
requestAnimationFrame(gameLoop);

}

gameLoop();

</script>

</body>
</html>
