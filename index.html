<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Tic Tac Toe</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.container{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,.3);
text-align:center;
width:380px;
}

h1{
margin-bottom:10px;
color:#0f4c81;
}

.status{
font-size:20px;
margin:15px 0;
font-weight:bold;
color:#444;
}

.scoreboard{
display:flex;
justify-content:space-around;
margin-bottom:20px;
background:#f4f4f4;
padding:10px;
border-radius:12px;
}

.scoreboard div{
font-weight:bold;
}

.board{
display:grid;
grid-template-columns:repeat(3,100px);
grid-template-rows:repeat(3,100px);
gap:8px;
justify-content:center;
}

.cell{
background:#eaf4ff;
border-radius:12px;
display:flex;
justify-content:center;
align-items:center;
font-size:50px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.cell:hover{
background:#d2ebff;
transform:scale(1.05);
}

button{
margin-top:20px;
padding:12px 25px;
font-size:16px;
border:none;
border-radius:10px;
background:#0f4c81;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#1464aa;
}
</style>
</head>

<body>

<div class="container">

<h1>🎮 Tic Tac Toe</h1>

<div class="scoreboard">
<div>❌ X : <span id="xScore">0</span></div>
<div>⭕ O : <span id="oScore">0</span></div>
<div>🤝 Draw : <span id="drawScore">0</span></div>
</div>

<div class="status" id="status">
Player X Turn
</div>

<div class="board" id="board"></div>

<button onclick="resetGame()">New Game</button>

</div>

<script>

const board=document.getElementById("board");
const status=document.getElementById("status");

let cells=[];
let current="X";
let game=true;

let xScore=0;
let oScore=0;
let drawScore=0;

const win=[
[0,1,2],
[3,4,5],
[6,7,8],
[0,3,6],
[1,4,7],
[2,5,8],
[0,4,8],
[2,4,6]
];

function createBoard(){

board.innerHTML="";
cells=[];

for(let i=0;i<9;i++){

let cell=document.createElement("div");

cell.className="cell";

cell.dataset.index=i;

cell.onclick=play;

board.appendChild(cell);

cells.push(cell);

}

}

function play(){

if(!game)return;

if(this.textContent!="")return;

this.textContent=current;

if(checkWinner()){

status.innerHTML="🎉 Player "+current+" Wins!";

game=false;

if(current=="X"){
xScore++;
document.getElementById("xScore").innerHTML=xScore;
}else{
oScore++;
document.getElementById("oScore").innerHTML=oScore;
}

return;

}

if(cells.every(c=>c.textContent!="")){

status.innerHTML="🤝 Match Draw";

drawScore++;
document.getElementById("drawScore").innerHTML=drawScore;

game=false;
return;

}

current=current=="X"?"O":"X";

status.innerHTML="Player "+current+" Turn";

}

function checkWinner(){

return win.some(pattern=>{

let[a,b,c]=pattern;

return cells[a].textContent &&
cells[a].textContent==cells[b].textContent &&
cells[a].textContent==cells[c].textContent;

});

}

function resetGame(){

current="X";

game=true;

status.innerHTML="Player X Turn";

createBoard();

}

createBoard();

</script>

</body>
</html>
